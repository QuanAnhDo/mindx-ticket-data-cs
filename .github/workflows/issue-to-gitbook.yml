
name: Sync Issue to GitBook Docs (Full Auto)
on:
  issues:
    types: [opened, edited]

jobs:
  sync_to_docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Parse Issue and Generate Markdown
        shell: python3 {0}
        run: |
          import json
          import re
          import os

          # 1. Lấy dữ liệu từ GitHub
          issue_body = """${{ github.event.issue.body }}"""
          issue_number = "${{ github.event.issue.number }}"
          issue_title = "${{ github.event.issue.title }}"
          issue_user = "${{ github.event.issue.user.login }}"
          issue_url = "${{ github.event.issue.html_url }}"
          issue_date = "${{ github.event.issue.created_at }}"
          issue_state = "${{ github.event.issue.state }}"

          def get_section(section_name, text):
              pattern = rf'### {section_name}\s*(.*?)(?=\s*###|$)'
              match = re.search(pattern, text, re.DOTALL)
              return match.group(1).strip() if match else ""

          # Giữ nguyên cấu trúc JSONn
          extracted_data = {
              "ticket_id": issue_number,
              "title": issue_title,
              "reporter": issue_user,
              "metadata": {"status": issue_state, "created_at": issue_date, "github_link": issue_url},
              "content": {
                  "description": get_section("Description", issue_body),
                  "context": get_section("Context", issue_body),
                  "odoo_link": get_section("Odoo Link", issue_body)
              }
          }

          # 2. Tạo file nội dung chi tiết cho từng Ticket
          os.makedirs("tickets", exist_ok=True)
          file_path = f"tickets/ticket-{issue_number}.md"
          
          md_content = f"""# Ticket #{issue_number}: {issue_title}
          
          ### Metadata
          - **Reporter:** @{issue_user}
          - **Status:** {issue_state}
          - **GitHub Link:** [View Issue]({issue_url})

          ---
          ### Content
          {issue_body}

          ---
          ### Technical Structured Data (JSON)
          ```json
          {json.dumps(extracted_data, ensure_ascii=False, indent=2)}
          ```
          """

          with open(file_path, "w", encoding="utf-8") as f:
              f.write(md_content)

          # 3. TỰ ĐỘNG CẬP NHẬT TRANG CHỦ (README.md)
          # Tạo định dạng link in đậm nhìn như một cái Card/Thanh ngang
          readme_line = f"* [**Ticket #{issue_number}: {issue_title}**](tickets/ticket-{issue_number}.md)\n"
          
          if not os.path.exists("README.md"):
              with open("README.md", "w", encoding="utf-8") as f:
                  f.write("# Ticket Data\n\nDưới đây là danh sách Ticket được cập nhật tự động:\n\n")
          
          with open("README.md", "r", encoding="utf-8") as f:
              readme_content = f.read()
          
          # Chỉ thêm vào README nếu chưa có link này
          if readme_line not in readme_content:
              with open("README.md", "a", encoding="utf-8") as f:
                  f.write(readme_line)

          # 4. TỰ ĐỘNG CẬP NHẬT MENU BÊN TRÁI (SUMMARY.md)
          summary_line = f"  * [Ticket #{issue_number}: {issue_title}](tickets/ticket-{issue_number}.md)\n"
          
          if not os.path.exists("SUMMARY.md"):
              with open("SUMMARY.md", "w", encoding="utf-8") as f:
                  f.write("# Table of contents\n\n* [Ticket Data](README.md)\n")
          
          with open("SUMMARY.md", "r", encoding="utf-8") as f:
              summary_content = f.read()
          
          if summary_line not in summary_content:
              with open("SUMMARY.md", "a", encoding="utf-8") as f:
                  f.write(summary_line)

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitBook Sync Bot"
          git config --global user.email "bot@gitbook.com"
          git add tickets/*.md SUMMARY.md README.md
          git commit -m "Full Auto Sync: Ticket #${{ github.event.issue.number }} to Home Page" || exit 0
          git push
