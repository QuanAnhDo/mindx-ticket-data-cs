name: "Submit New Ticket Data (Form)"
description: "Nhập liệu Ticket hỗ trợ hệ thống theo dạng bảng"
title: "Title"
body:
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Mô tả chi tiết vấn đề khách gặp phải"
      placeholder: "Ví dụ: Khách muốn lùi ngày order..."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: "Context"
      description: "Phản hồi hoặc hướng xử lý của Tech Team"
      placeholder: "Ví dụ: Đã cập nhật trên hệ thống..."
    validations:
      required: true
  - type: input
    id: odoo_link
    attributes:
      label: "CRM link"
      description: "Dán link CRM vào đây"
      placeholder: "https://crm.mindx.edu.vn/..."
    validations:
      required: false
